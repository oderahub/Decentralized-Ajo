name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Rust toolchain (matches contracts/ajo-circle/rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.84.0
        with:
          targets: wasm32-unknown-unknown

      - name: Build & unit-test Soroban contract
        working-directory: contracts/ajo-circle
        run: |
          cargo build --target wasm32-unknown-unknown --release
          cargo test --lib

      - name: Prisma Generate
        run: pnpm prisma generate

      - name: Next.js build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars-long
        run: pnpm build
